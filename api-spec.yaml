openapi: 3.0.0

info:
  title: Groov API
  version: 1.0.0
  description: |
    REST API specifikacija Groov šokių judesių mokymosi ir choreografijos platformai.
    Groov sistema skirta šokėjams padėti mokytis ir atsiminti šokių judesius,
    kurti sekų choreografijas ir įvertinti kitų vartotojų sukurtas sekas.

    **Autentifikacija:**
    - Sistema naudoja JWT token'us su HTTP-only cookies
    - Access token'ai ir refresh token'ai saugomi slapukuose
    - Chranomi endpointai pažymėti 🔒 simboliu

  contact:
    name: Groov Support
    email: support@groov.lt

servers:
  - url: http://localhost:3003
    description: Local development server
  - url: https://api.groov.lt
    description: Production server

tags:
  - name: Auth
    description: Autentifikacijos ir autorizacijos operacijos
  - name: Dance Moves
    description: Šokių judesių valdymo operacijos
  - name: Dance Sequences
    description: Šokių sekų valdymo operacijos
  - name: Sequence Moves
    description: Judesių priskyrimo sekoms operacijos
  - name: Events
    description: Renginių valdymo operacijos

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: JWT access token saugomas HTTP-only cookie

  schemas:
    # Auth Schemas
    SignupRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: "user123"
          description: Unikalus vartotojo vardas
        password:
          type: string
          minLength: 6
          format: password
          example: "password123"
          description: Vartotojo slaptažodis (minimum 6 simboliai)

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "user123"
        password:
          type: string
          format: password
          example: "password123"

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: "user123"
        role:
          type: string
          enum: [admin, user]
          example: "user"
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    # Dance Move Schemas
    DanceMove:
      type: object
      required:
        - name
        - difficulty
        - start_position
        - end_position
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Swing Out"
          description: Šokio judesiuo pavadinimas
        description:
          type: string
          maxLength: 500
          example: "Basic swing out movement from closed position to open"
          description: Detalus judesio aprašymas
        difficulty:
          type: string
          enum: [easy, medium, hard, very_hard]
          example: "medium"
          description: Judesio sudėtingumas
        start_position:
          type: string
          enum: [closed, openLeftToRight, openRightToRight, openLeftToLeft, openRightToLeft, sweethearts]
          example: "closed"
          description: Pradinė pozicija prieš judesį
        end_position:
          type: string
          enum: [closed, openLeftToRight, openRightToRight, openLeftToLeft, openRightToLeft, sweethearts]
          example: "openLeftToRight"
          description: Galinė pozicija po judesio
        parent_move_id:
          type: integer
          nullable: true
          example: null
          description: Tėvinio judesio ID (jei judesis yra variacija)
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: "2024-01-15T10:30:00Z"
        deleted:
          type: boolean
          readOnly: true
          example: false

    DanceMoveCreate:
      type: object
      required:
        - name
        - difficulty
        - start_position
        - end_position
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Swing Out"
        description:
          type: string
          maxLength: 500
          example: "Basic swing out movement from closed position to open"
        difficulty:
          type: string
          enum: [easy, medium, hard, very_hard]
          example: "medium"
        start_position:
          type: string
          enum: [closed, openLeftToRight, openRightToRight, openLeftToLeft, openRightToLeft, sweethearts]
          example: "closed"
        end_position:
          type: string
          enum: [closed, openLeftToRight, openRightToRight, openLeftToLeft, openRightToLeft, sweethearts]
          example: "openLeftToRight"
        parent_move_id:
          type: integer
          nullable: true
          example: null

    DanceMoveUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Swing Out Updated"
        description:
          type: string
          maxLength: 500
          example: "Updated description"
        difficulty:
          type: string
          enum: [easy, medium, hard, very_hard]
          example: "hard"
        start_position:
          type: string
          enum: [closed, openLeftToRight, openRightToRight, openLeftToLeft, openRightToLeft, sweethearts]
          example: "closed"
        end_position:
          type: string
          enum: [closed, openLeftToRight, openRightToRight, openLeftToLeft, openRightToLeft, sweethearts]
          example: "openLeftToRight"
        parent_move_id:
          type: integer
          nullable: true
          example: 5

    # Dance Sequence Schemas
    DanceSequence:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: "My First Choreography"
          description: Sekos pavadinimas
        description:
          type: string
          example: "Beginner-friendly sequence"
          description: Sekos aprašymas
        event_id:
          type: integer
          nullable: true
          example: 1
          description: Susijusio renginio ID (jei yra)
        creator_id:
          type: integer
          readOnly: true
          example: 5
          description: Sekos kūrėjo vartotojo ID
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: "2024-01-15T10:30:00Z"
        deleted:
          type: boolean
          readOnly: true
          example: false

    DanceSequenceCreate:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "My First Choreography"
        description:
          type: string
          maxLength: 500
          example: "Beginner-friendly sequence for learning basics"
        event_id:
          type: integer
          nullable: true
          example: null

    DanceSequenceUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Updated Choreography Name"
        description:
          type: string
          maxLength: 500
          example: "Updated description"
        event_id:
          type: integer
          nullable: true
          example: 2

    # Sequence Moves Schema
    MoveOfSequence:
      type: object
      properties:
        id:
          type: integer
          example: 1
        sequence_id:
          type: integer
          example: 1
        move_id:
          type: integer
          example: 3
        order_index:
          type: integer
          example: 0
          description: Judesio pozicija sekoje (pradedant nuo 0)
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    UpdateSequenceMovesRequest:
      type: object
      required:
        - moveIds
      properties:
        moveIds:
          type: array
          items:
            type: integer
          example: [1, 3, 5, 2]
          description: Judesių ID masyvas reikiama tvarka

    # Event Schemas
    Event:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: "Vilnius Swing Festival 2024"
          description: Renginio pavadinimas
        description:
          type: string
          example: "Annual swing dance festival"
          description: Renginio aprašymas
        location:
          type: string
          example: "Vilnius, Lithuania"
          description: Renginio vieta
        event_date:
          type: string
          format: date-time
          example: "2024-06-15T18:00:00Z"
          description: Renginio data ir laikas
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: "2024-01-15T10:30:00Z"
        deleted:
          type: boolean
          readOnly: true
          example: false

    EventCreate:
      type: object
      required:
        - name
        - location
        - event_date
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Vilnius Swing Festival 2024"
        description:
          type: string
          maxLength: 500
          example: "Annual swing dance festival"
        location:
          type: string
          maxLength: 200
          example: "Vilnius, Lithuania"
        event_date:
          type: string
          format: date-time
          example: "2024-06-15T18:00:00Z"

    EventUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Updated Festival Name"
        description:
          type: string
          maxLength: 500
          example: "Updated description"
        location:
          type: string
          maxLength: 200
          example: "Updated location"
        event_date:
          type: string
          format: date-time
          example: "2024-07-15T18:00:00Z"

    # Error Schemas
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Resource not found"
        message:
          type: string
          example: "The requested dance move does not exist"
        statusCode:
          type: integer
          example: 404

    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: "Validation failed"
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: "difficulty"
              message:
                type: string
                example: "Invalid difficulty value"

paths:
  # ============================================
  # AUTH ENDPOINTS
  # ============================================
  /auth/signup:
    post:
      tags:
        - Auth
      summary: Registruoti naują vartotoją
      description: |
        Sukuria naują vartotojo paskyrą sistemoje.
        Vartotojo vardas turi būti unikalus.
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
            examples:
              validSignup:
                summary: Teisingas registracijos pavyzdys
                value:
                  username: "swingdancer2024"
                  password: "SecurePass123"
      responses:
        '200':
          description: Registracija sėkminga - vartotojas sukurtas
          content:
            application/json:
              example:
                message: "User created successfully"
        '400':
          description: Neteisingi duomenys
          content:
            application/json:
              example:
                error: "Bad request"
                message: "Username and password are required"
        '409':
          description: Konfliktas - vartotojas jau egzistuoja
          content:
            application/json:
              example:
                error: "Conflict"
                message: "Username already exists"
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X POST http://localhost:3003/auth/signup \
              -H "Content-Type: application/json" \
              -d '{
                "username": "swingdancer2024",
                "password": "SecurePass123"
              }'
        - lang: 'JavaScript'
          source: |
            const response = await fetch('http://localhost:3003/auth/signup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                username: 'swingdancer2024',
                password: 'SecurePass123'
              })
            });

  /auth/login:
    post:
      tags:
        - Auth
      summary: Prisijungti prie sistemos
      description: |
        Autentifikuoja vartotoją ir grąžina JWT token'us HTTP-only slapukuose.
        Access token naudojamas API užklausoms, refresh token - token atnaujinimui.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              validLogin:
                summary: Teisingas prisijungimas
                value:
                  username: "swingdancer2024"
                  password: "SecurePass123"
      responses:
        '200':
          description: Prisijungimas sėkmingas
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "accessToken=eyJhbGc...; HttpOnly; Secure; SameSite=Strict"
              description: Access token ir refresh token HTTP-only cookies
          content:
            application/json:
              example:
                message: "Login successful"
        '400':
          description: Neteisingi prisijungimo duomenys
          content:
            application/json:
              example:
                error: "Bad request"
                message: "Invalid username or password"
        '401':
          description: Autentifikacija nepavyko
          content:
            application/json:
              example:
                error: "Unauthorized"
                message: "Invalid credentials"
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X POST http://localhost:3003/auth/login \
              -H "Content-Type: application/json" \
              -c cookies.txt \
              -d '{
                "username": "swingdancer2024",
                "password": "SecurePass123"
              }'
        - lang: 'JavaScript'
          source: |
            const response = await fetch('http://localhost:3003/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify({
                username: 'swingdancer2024',
                password: 'SecurePass123'
              })
            });

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Atsijungti nuo sistemos
      description: |
        Ištrina autentifikacijos slapukus ir anuliuoja refresh token duomenų bazėje.
        Vartotojas turi būti prisijungęs.
      operationId: logout
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Atsijungimas sėkmingas
          content:
            application/json:
              example:
                message: "Logout successful"
        '400':
          description: Neteisingi duomenys
          content:
            application/json:
              example:
                error: "Bad request"
        '500':
          description: Serverio klaida
          content:
            application/json:
              example:
                error: "Internal server error"
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X POST http://localhost:3003/auth/logout \
              -b cookies.txt \
              -c cookies.txt
        - lang: 'JavaScript'
          source: |
            const response = await fetch('http://localhost:3003/auth/logout', {
              method: 'POST',
              credentials: 'include'
            });

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Atnaujinti access token
      description: |
        Naudoja refresh token iš slapuko, kad gautų naują access token.
        Automatiškai kviečiamas frontend, kai access token baigiasi galioti.
      operationId: refreshToken
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Token atnaujintas sėkmingai
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Naujas access token slapuke
          content:
            application/json:
              schema:
                type: object
                properties:
                  newAccessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '400':
          description: Refresh token nerastas
          content:
            application/json:
              example:
                error: "Bad request"
                message: "Refresh token is required"
        '401':
          description: Neteisingas arba pasibaigęs refresh token
          content:
            application/json:
              example:
                error: "Unauthorized"
                message: "Invalid or expired refresh token"
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X POST http://localhost:3003/auth/refresh \
              -b cookies.txt \
              -c cookies.txt
        - lang: 'JavaScript'
          source: |
            const response = await fetch('http://localhost:3003/auth/refresh', {
              method: 'POST',
              credentials: 'include'
            });
            const data = await response.json();

  /auth/me:
    get:
      tags:
        - Auth
      summary: Gauti dabartinio vartotojo informaciją
      description: |
        Grąžina prisijungusio vartotojo duomenis pagal access token iš slapuko.
      operationId: getCurrentUser
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Vartotojo duomenys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 1
                username: "swingdancer2024"
                role: "user"
                created_at: "2024-01-15T10:30:00Z"
        '401':
          description: Neprisijungęs arba neteisingas token
          content:
            application/json:
              example:
                error: "Unauthorized"
                message: "Authentication required"
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X GET http://localhost:3003/auth/me \
              -b cookies.txt
        - lang: 'JavaScript'
          source: |
            const response = await fetch('http://localhost:3003/auth/me', {
              credentials: 'include'
            });
            const user = await response.json();

  # ============================================
  # DANCE MOVES ENDPOINTS
  # ============================================
  /dance-moves:
    get:
      tags:
        - Dance Moves
      summary: Gauti visus šokių judesius
      description: |
        Grąžina visų aktyvių (neištrintų) šokių judesių sąrašą.
        Galima filtruoti pagal pavadinimą naudojant search parametrą.
      operationId: getAllDanceMoves
      parameters:
        - name: search
          in: query
          description: Paieškos tekstas judesio pavadinime
          required: false
          schema:
            type: string
          example: "swing"
      responses:
        '200':
          description: Šokių judesių sąrašas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DanceMove'
              examples:
                movesList:
                  summary: Judesių sąrašo pavyzdys
                  value:
                    - id: 1
                      name: "Swing Out"
                      description: "Basic swing out movement"
                      difficulty: "easy"
                      start_position: "closed"
                      end_position: "openLeftToRight"
                      parent_move_id: null
                      created_at: "2024-01-15T10:30:00Z"
                      updated_at: "2024-01-15T10:30:00Z"
                      deleted: false
                    - id: 2
                      name: "Tuck Turn"
                      description: "Turn variation from open position"
                      difficulty: "medium"
                      start_position: "openLeftToRight"
                      end_position: "openLeftToRight"
                      parent_move_id: null
                      created_at: "2024-01-15T11:00:00Z"
                      updated_at: "2024-01-15T11:00:00Z"
                      deleted: false
      x-codeSamples:
        - lang: 'curl'
          source: |
            # Gauti visus judesius
            curl -X GET http://localhost:3003/dance-moves

            # Su paieška
            curl -X GET "http://localhost:3003/dance-moves?search=swing"
        - lang: 'JavaScript'
          source: |
            // Gauti visus judesius
            const response = await fetch('http://localhost:3003/dance-moves');
            const moves = await response.json();

            // Su paieška
            const searchResponse = await fetch('http://localhost:3003/dance-moves?search=swing');
            const searchResults = await searchResponse.json();

    post:
      tags:
        - Dance Moves
      summary: 🔒 Sukurti naują šokių judesį
      description: |
        Sukuria naują šokių judesį sistemoje.
        **Reikalinga admin teisės.**
      operationId: createDanceMove
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DanceMoveCreate'
            examples:
              basicMove:
                summary: Paprasto judesio kūrimas
                value:
                  name: "Circle Left"
                  description: "Circular movement to the left"
                  difficulty: "easy"
                  start_position: "closed"
                  end_position: "closed"
                  parent_move_id: null
              variationMove:
                summary: Variacija su tėviniu judesiu
                value:
                  name: "Swing Out with Style"
                  description: "Stylish variation of basic swing out"
                  difficulty: "hard"
                  start_position: "closed"
                  end_position: "openLeftToRight"
                  parent_move_id: 1
      responses:
        '201':
          description: Judesis sukurtas sėkmingai
          headers:
            Location:
              schema:
                type: string
              description: URL naujai sukurto judesio
              example: "/dance-moves/15"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DanceMove'
              example:
                id: 15
                name: "Circle Left"
                description: "Circular movement to the left"
                difficulty: "easy"
                start_position: "closed"
                end_position: "closed"
                parent_move_id: null
                created_at: "2024-01-20T14:30:00Z"
                updated_at: "2024-01-20T14:30:00Z"
                deleted: false
        '400':
          description: Neteisingi duomenys arba validacijos klaida
          content:
            application/json:
              examples:
                emptyBody:
                  summary: Tuščias request body
                  value:
                    error: "Bad request"
                    message: "Request body cannot be empty."
                idNotAllowed:
                  summary: ID laukas neleistinas
                  value:
                    error: "Bad request"
                    message: "ID field is not allowed when creating a new DanceMove."
                validationError:
                  summary: Validacijos klaida
                  value:
                    error: "Validation error"
                    message: "Could not post dance move object"
        '401':
          description: Neautentifikuotas vartotojas
          content:
            application/json:
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '403':
          description: Nepakankamos teisės (ne admin)
          content:
            application/json:
              example:
                error: "Forbidden"
                message: "Admin role required"
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X POST http://localhost:3003/dance-moves \
              -H "Content-Type: application/json" \
              -b cookies.txt \
              -d '{
                "name": "Circle Left",
                "description": "Circular movement to the left",
                "difficulty": "easy",
                "start_position": "closed",
                "end_position": "closed",
                "parent_move_id": null
              }'
        - lang: 'JavaScript'
          source: |
            const response = await fetch('http://localhost:3003/dance-moves', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify({
                name: 'Circle Left',
                description: 'Circular movement to the left',
                difficulty: 'easy',
                start_position: 'closed',
                end_position: 'closed',
                parent_move_id: null
              })
            });
            const newMove = await response.json();

  /dance-moves/{id}:
    get:
      tags:
        - Dance Moves
      summary: Gauti šokių judesį pagal ID
      description: Grąžina detalią informaciją apie konkretų šokių judesį
      operationId: getDanceMoveById
      parameters:
        - name: id
          in: path
          required: true
          description: Šokių judesio ID
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        '200':
